<!DOCTYPE html>
<html lang="en">

  <style>
    body {

      background: #f4f4f4;
      display: flex;

      align-items: center;
      height: 100vh;
    }
    .menu {
      width: 100%;
      max-width: 400px;
    }
    .menu-card {
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      padding: 20px;
      margin: 15px 0;
      display: flex;
      align-items: center;
      transition: transform 0.2s;
    }
    .menu-card:hover {
      transform: scale(1.03);
    }
    .menu-icon {
      font-size: 28px;
      margin-right: 15px;
    }
    .menu-text {
      font-size: 18px;
      font-weight: 600;
    }
  </style>
</head>
<body>

      <a href="tel:+93202108512" class="menu-text text-success">Call Us</a>
    </div>
    <div class="menu-card">
      <i class="fab fa-whatsapp menu-icon text-success"></i>
      <a href="https://wa.me/+93777999583" target="_blank" class="menu-text text-success">WhatsApp</a>
    </div>
    <div class="menu-card">
      <i class="fab fa-facebook menu-icon text-primary"></i>

    </div>
    <div class="menu-card">
      <i class="fab fa-instagram menu-icon text-danger"></i>
      <a href="https://instagram.com/hameedullahshirzadmsp" target="_blank" class="menu-text text-danger">Instagram</a>
    </div>

</body>
